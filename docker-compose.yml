services:
  opensearch:
    # 2.11.x = Java 17 번들 (2.12+ 는 Java 21 → Docker Desktop ARM64에서 SIGILL 발생 가능)
    image: opensearchproject/opensearch:2.11.1
    platform: linux/arm64
    container_name: opensearch-issue-711
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=false
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - DISABLE_SECURITY_PLUGIN=true
      - DISABLE_INSTALL_DEMO_CONFIG=true
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null -w '%{http_code}' http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  # Spark + opensearch-hadoop 테스트 실행용 (Bitnami 이미지는 amd64만 제공 → 플랫폼 명시)
  spark-test:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile.spark-test
    container_name: spark-test-issue-711
    depends_on:
      opensearch:
        condition: service_healthy
    environment:
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
    volumes:
      - ./scripts:/app/scripts
      - ./test_output:/app/test_output

volumes:
  opensearch-data:
